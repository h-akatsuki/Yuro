name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*" # 当推送 v 开头的tag时触发，如 v1.0.0
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # 获取完整的 git 历史

      - name: Setup Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Create keystore file
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # 获取完整的 git 历史

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos/
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qq -r -9 app-release.ipa Payload

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-build
          path: build/ios/iphoneos/app-release.ipa

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # 获取完整的 git 历史

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "build/windows/x64/runner/Release/windows-release.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/windows-release.zip

  upload:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # 获取完整的 git 历史

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./dist/
          merge-multiple: true

      - name: List files
        run: tree dist

      - name: Prepare scripts
        run: |
          mkdir -p .github/scripts
          chmod +x .github/scripts/process_commits.sh

      - name: Get Previous tag
        id: previoustag
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "v0.0.0")
          echo "tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT

      - name: Generate commit messages
        id: commits
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=${{ steps.previoustag.outputs.tag }}
          COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s%n%b" | .github/scripts/process_commits.sh)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.1
        with:
          prerelease: true
          draft: false
          body: |
            ## 🚧 Pre-release Version

            ### 📋 Release Information
            **Version:** ${{ github.ref_name }}
            **Previous Version:** ${{ steps.previoustag.outputs.tag }}
            **Build Environment:** Flutter ${{ env.FLUTTER_VERSION }}

            ### 📝 Changelog
            ${{ steps.commits.outputs.commits }}

            ### 📦 Distribution
            | File | Description | Purpose |
            |------|-------------|----------|
            | `.apk` | Android Package | Direct installation for testing |
            | `.aab` | Android App Bundle | Google Play Store deployment |
            | `.ipa` | iOS Package | iOS sideload/testing distribution |
            | `.zip` | Windows Package | Windows desktop distribution |

            ### 🔍 Additional Notes
            - This is a pre-release build intended for testing purposes
            - Features and functionality may not be fully stable
            - Not recommended for production use

            ### 📱 Compatibility
            - Minimum Android SDK: 24 (Android 7.0)
            - Target Android SDK: 36 (Android 16)

            > **Note:** Please report any issues or bugs through the GitHub issue tracker.
          files: |
            dist/flutter-apk/app-release.apk
            dist/bundle/release/app-release.aab
            dist/app-release.ipa
            dist/windows-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts if not release
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v7.0.1
        with:
          name: everything
          path: dist/
